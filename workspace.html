function getAuth(){try{var s=JSON.parse(localStorage.getItem(AUTH_SK));if(s&&s.access_token&&s.expires_at>Date.now()/1000)return s}catch(e){}return null}
function sbHeaders(){var a=getAuth();return{"apikey":SB_KEY,"Authorization":"Bearer "+(a?a.access_token:SB_KEY),"Content-Type":"application/json"}}

    var url=SB_URL+"/rest/v1/notebooks?id=eq.ws-notebooks";

      var postUrl=rows.length>0?url:SB_URL+"/rest/v1/notebooks";

}

      localStorage.setItem(NB_LIST_KEY,JSON.stringify(rows[0].data.notebooks));

}

  nav.appendChild(addBtn);
  if(a){var out=document.createElement("button");out.textContent="\u00d7";out.title="Sign out";out.style.cssText="color:#444;font-size:16px;background:none;border:none;cursor:pointer;padding:8px 10px;font-family:'JetBrains Mono',monospace;margin-left:auto;-webkit-tap-highlight-color:transparent;flex-shrink:0";out.onclick=function(){localStorage.removeItem(AUTH_SK);window.location.href="index.html"};nav.appendChild(out)}
}
renderNav();

var _wsSyncTimer=null,_wsSyncing=0,_wsLastPush=0,_wsPollInt=null,_wsLocalDirty=0;
function wsSyncPush(data){
  _wsLocalDirty=1;if(_wsSyncTimer)clearTimeout(_wsSyncTimer);
  _wsSyncTimer=setTimeout(function(){_wsDoSync(data)},2000);
}
function _wsDoSync(data){
  if(_wsSyncing||!getAuth())return;_wsSyncing=1;
  var sid=getSyncId();
  var url=SB_URL+"/rest/v1/notebooks?id=eq."+sid;
  var body=JSON.stringify({id:sid,data:data,updated_at:new Date().toISOString()});
  fetch(url,{method:"GET",headers:sbHeaders()})
  .then(function(r){return r.json()}).then(function(rows){
    var method=rows.length>0?"PATCH":"POST";
    var postUrl=rows.length>0?url:SB_URL+"/rest/v1/notebooks";
    var hdrs=sbHeaders();hdrs["Prefer"]="return=minimal";
    return fetch(postUrl,{method:method,headers:hdrs,body:body});
  }).then(function(){
    _wsSyncing=0;_wsLocalDirty=0;_wsLastPush=Date.now();wsStartPoll();
  }).catch(function(e){_wsSyncing=0;console.error("WS sync push failed:",e)});
}
function wsSyncPull(cb){
  if(!getAuth()){if(cb)cb(null);return}
  var sid=getSyncId();
  fetch(SB_URL+"/rest/v1/notebooks?id=eq."+sid+"&select=data,updated_at",{method:"GET",headers:sbHeaders()})
  .then(function(r){return r.json()}).then(function(rows){
    if(rows.length>0&&rows[0].data){cb(rows[0].data)}else{cb(null)}
  }).catch(function(e){console.error("WS sync pull failed:",e);cb(null)});
}
function wsStartPoll(){if(_wsPollInt)return;_wsPollInt=setInterval(wsPollCheck,15000)}
function wsStopPoll(){if(_wsPollInt){clearInterval(_wsPollInt);_wsPollInt=null}}
function wsPollCheck(){
  if(_wsSyncing||!getAuth())return;
  var sid=getSyncId();
  fetch(SB_URL+"/rest/v1/notebooks?id=eq."+sid+"&select=updated_at",{method:"GET",headers:sbHeaders()})
  .then(function(r){return r.json()}).then(function(rows){
    if(!rows||rows.length===0)return;
    var remoteTime=new Date(rows[0].updated_at).getTime();
    if(remoteTime>_wsLastPush&&!_wsLocalDirty){
      wsSyncPull(function(remote){if(remote&&window._wsApplyRemote)window._wsApplyRemote(remote)});
    }
  }).catch(function(){});
}
document.addEventListener("visibilitychange",function(){if(!document.hidden){wsPollCheck();wsStartPoll()}});
</script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

const COLORS = [
  { name: "slate", bg: "#1e293b", border: "#334155", text: "#e2e8f0", accent: "#64748b", tint: "#0f1520" },
  { name: "ember", bg: "#451a03", border: "#92400e", text: "#fde68a", accent: "#d97706", tint: "#1a0f02" },
  { name: "moss", bg: "#052e16", border: "#166534", text: "#bbf7d0", accent: "#22c55e", tint: "#04140a" },
  { name: "ocean", bg: "#0c1a3d", border: "#1e40af", text: "#bfdbfe", accent: "#3b82f6", tint: "#060d1e" },
  { name: "plum", bg: "#2e1065", border: "#6b21a8", text: "#e9d5ff", accent: "#a855f7", tint: "#150a2e" },
  { name: "rust", bg: "#431407", border: "#9a3412", text: "#fed7aa", accent: "#ea580c", tint: "#1a0a04" },
];
const SL = ["ready", "blocked", "done"];
const SM = { ready: { icon: "◆", color: "#22c55e", label: "ready" }, blocked: { icon: "■", color: "#ef4444", label: "blocked" }, done: { icon: "✓", color: "#525252", label: "done" } };
const uid = () => Math.random().toString(36).substr(2, 9);
const STORE = getStoreKey();
const KEYS_STORE = "ws-keys-v1";
const F = "'JetBrains Mono','SF Mono','Fira Code','Consolas',monospace";

const DEFAULT_KEYS = {
  goUp: { key: "Tab", mod: "", label: "go up a level" },
  child: { key: "Enter", mod: "meta", label: "create child node" },
  sibling: { key: "Enter", mod: "shift", label: "create linked sibling" },
  addTask: { key: "/", mod: "", label: "add task" },
  promote: { key: "[", mod: "", label: "promote node" },
  demote: { key: "]", mod: "", label: "demote node" },
  find: { key: "f", mod: "meta", label: "search" },
  drillIn: { key: "Enter", mod: "", label: "drill into node" },
  focus: { key: ".", mod: "", label: "focus mode" },
  decompose: { key: "d", mod: "", label: "decompose" },
  group: { key: "g", mod: "", label: "group selected" },
};

const modLabel = (mod) => { if (!mod) return ""; if (mod === "meta") return navigator.platform?.includes("Mac") ? "⌘+" : "ctrl+"; if (mod === "shift") return "shift+"; return mod + "+"; };
const keyLabel = (k) => { if (k === " ") return "space"; if (k === "Tab") return "tab"; if (k === "Enter") return "enter"; if (k === "Backspace") return "backspace"; return k; };
const fmtBind = (b) => `${modLabel(b.mod)}${keyLabel(b.key)}`;
const matchBind = (e, b) => { if (!b) return false; const wM = b.mod === "meta"; const wS = b.mod === "shift"; if (wM && !(e.metaKey || e.ctrlKey)) return false; if (wS && !e.shiftKey) return false; if (!wM && (e.metaKey || e.ctrlKey)) return false; if (!wS && e.shiftKey) return false; return e.key === b.key || e.key.toLowerCase() === b.key.toLowerCase(); };
const isToday = (ts) => { if (!ts) return false; const d = new Date(ts), n = new Date(); return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate(); };
const isRecent = (ts, days = 7) => ts && Date.now() - ts < days * 86400000;
const fmtDate = (ts) => { if (!ts) return ""; if (isToday(ts)) return "today"; const d = new Date(ts); const y = new Date(); y.setDate(y.getDate() - 1); if (d.getFullYear() === y.getFullYear() && d.getMonth() === y.getMonth() && d.getDate() === y.getDate()) return "yesterday"; return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()] + " " + ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()] + " " + d.getDate(); };

const loadJSON = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } };
const saveJSON = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} };

function Workspace() {
  const [nodes, setNodes] = useState([]);
  const [viewParentId, setViewParentId] = useState(null);
  const [selectedId, setSelectedId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editingField, setEditingField] = useState(null);
  const [dragState, setDragState] = useState(null);
  const [offset, setOffset] = useState({ x: 0, y: 0 });
  const [isPanning, setIsPanning] = useState(false);
  const [panStart, setPanStart] = useState(null);
  const [connections, setConnections] = useState([]);
  const [connectingFrom, setConnectingFrom] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [taskInputNodeId, setTaskInputNodeId] = useState(null);
  const [taskInputText, setTaskInputText] = useState("");
  const [editingTaskId, setEditingTaskId] = useState(null);
  const [editingTaskText, setEditingTaskText] = useState("");
  const [editingBlockReason, setEditingBlockReason] = useState(null);
  const [blockReasonText, setBlockReasonText] = useState("");
  const [panelOpen, setPanelOpen] = useState(typeof window !== "undefined" && window.innerWidth >= 768);
  const [panelTab, setPanelTab] = useState("ready");
  const [keyBindings, setKeyBindings] = useState(DEFAULT_KEYS);
  const [remapOpen, setRemapOpen] = useState(false);
  const [remapTarget, setRemapTarget] = useState(null);
  const [legendVisible, setLegendVisible] = useState(true);
  const [colorPickerNodeId, setColorPickerNodeId] = useState(null);
  const [editingConIdx, setEditingConIdx] = useState(null);
  const [conLabelText, setConLabelText] = useState("");
  const [decomposeOpen, setDecomposeOpen] = useState(false);
  const [decomposeMode, setDecomposeMode] = useState("manual");
  const [decomposeText, setDecomposeText] = useState("");
  const [decomposeContext, setDecomposeContext] = useState("");
  const [decomposeChat, setDecomposeChat] = useState([]);
  const [decomposeLoading, setDecomposeLoading] = useState(false);
  const [decomposeNodes, setDecomposeNodes] = useState([]);
  const [decomposeConfirmClose, setDecomposeConfirmClose] = useState(false);
  const [groups, setGroups] = useState([]);
  const [multiSelect, setMultiSelect] = useState(new Set());
  const [editingGroupId, setEditingGroupId] = useState(null);
  const [groupConfirmDelete, setGroupConfirmDelete] = useState(null);
  const [focusNodeId, setFocusNodeId] = useState(null);
  const [focusStart, setFocusStart] = useState(null);
  const [focusMicroStep, setFocusMicroStep] = useState("");
  const [focusExitNote, setFocusExitNote] = useState("");
  const [focusElapsed, setFocusElapsed] = useState(0);
  const [focusSessions, setFocusSessions] = useState([]);
  const [dailyIntention, setDailyIntention] = useState("");
  const [intentionDate, setIntentionDate] = useState("");
  const [showIntentionPrompt, setShowIntentionPrompt] = useState(false);

  const canvasRef = useRef(null);
  const titleRef = useRef(null);
  const notesRef = useRef(null);
  const searchRef = useRef(null);
  const taskAddRef = useRef(null);
  const taskEditRef = useRef(null);
  const blockRef = useRef(null);
  const microRef = useRef(null);
  const intentionRef = useRef(null);
  const exitNoteRef = useRef(null);
  const conLabelRef = useRef(null);
  const decomposeRef = useRef(null);

  // Load
  useEffect(() => {
    wsSyncPull(function(remote) {
      var data = remote || loadJSON(STORE, null);
      if (data && data.nodes) {
        setNodes(data.nodes.map((n) => ({ ...n, sessions: n.sessions || [], tasks: (n.tasks || []).map((t) => ({ blockReason: "", completedAt: null, ...t })) })));
        setConnections(data.connections || []);
        if (data.focusSessions) setFocusSessions(data.focusSessions);
        if (data.groups) setGroups(data.groups);
        if (data.intention) { setDailyIntention(data.intention.text || ""); setIntentionDate(data.intention.date || ""); }
        if (remote) { saveJSON(STORE, data); _wsLastPush = Date.now(); }
      }
      const keys = loadJSON(KEYS_STORE, null);
      if (keys) setKeyBindings({ ...DEFAULT_KEYS, ...keys });
      setLoaded(true);
      wsStartPoll();
      // Show intention prompt if no intention set today
      const today = new Date().toISOString().split("T")[0];
      if (!data?.intention?.date || data.intention.date !== today) {
        setTimeout(() => setShowIntentionPrompt(true), 300);
      }
    });
  }, []);

  // Remote apply callback
  useEffect(() => {
    window._wsApplyRemote = (remote) => {
      if (remote && remote.nodes) {
        setNodes(remote.nodes.map((n) => ({ ...n, sessions: n.sessions || [], tasks: (n.tasks || []).map((t) => ({ blockReason: "", completedAt: null, ...t })) })));
        setConnections(remote.connections || []);
        if (remote.focusSessions) setFocusSessions(remote.focusSessions);
        if (remote.groups) setGroups(remote.groups);
        if (remote.intention) { setDailyIntention(remote.intention.text || ""); setIntentionDate(remote.intention.date || ""); }
        saveJSON(STORE, remote);
      }
    };
    return () => { window._wsApplyRemote = null; };
  }, []);

  // Save (local + cloud)
  useEffect(() => { if (loaded) { const t = setTimeout(() => { const payload = { nodes, connections, groups, focusSessions, intention: { text: dailyIntention, date: intentionDate }, _ts: Date.now() }; saveJSON(STORE, payload); wsSyncPush(payload); }, 400); return () => clearTimeout(t); } }, [nodes, connections, groups, focusSessions, dailyIntention, intentionDate, loaded]);
  useEffect(() => { if (loaded) { const t = setTimeout(() => saveJSON(KEYS_STORE, keyBindings), 300); return () => clearTimeout(t); } }, [keyBindings, loaded]);

  const visibleNodes = nodes.filter((n) => n.parentId === viewParentId);
  const childCount = useCallback((id) => nodes.filter((n) => n.parentId === id).length, [nodes]);
  const getNode = useCallback((id) => nodes.find((n) => n.id === id), [nodes]);
  const getChildren = useCallback((id) => nodes.filter((n) => n.parentId === id), [nodes]);
  const vpNode = viewParentId ? getNode(viewParentId) : null;
  const vc = vpNode ? COLORS[vpNode.colorIdx] : null;

  const readyCounts = useMemo(() => { const m = {}; const calc = (id) => { if (m[id] !== undefined) return m[id]; const nd = nodes.find((n) => n.id === id); if (!nd) return 0; let c = (nd.tasks || []).filter((t) => t.status === "ready").length; nodes.filter((n) => n.parentId === id).forEach((ch) => { c += calc(ch.id); }); m[id] = c; return c; }; nodes.forEach((n) => calc(n.id)); return m; }, [nodes]);
  const buildPath = useCallback((nid) => { const p = []; let c = nid; while (c) { const nd = nodes.find((x) => x.id === c); if (!nd) break; p.unshift(nd); c = nd.parentId; } return p; }, [nodes]);
  const allReadyTasks = useMemo(() => { const r = []; nodes.forEach((n) => (n.tasks || []).forEach((t) => { if (t.status === "ready") r.push({ task: t, node: n, path: buildPath(n.id) }); })); return r; }, [nodes, buildPath]);
  const allBlockedTasks = useMemo(() => { const r = []; nodes.forEach((n) => (n.tasks || []).forEach((t) => { if (t.status === "blocked") r.push({ task: t, node: n, path: buildPath(n.id) }); })); return r; }, [nodes, buildPath]);

    if (selectedId) { r.push({ label: keyBindings.child.label, key: fmtBind(keyBindings.child) }); r.push({ label: keyBindings.sibling.label, key: fmtBind(keyBindings.sibling) }); r.push({ label: keyBindings.addTask.label, key: fmtBind(keyBindings.addTask) }); if (nodes.filter((n) => n.parentId === selectedId).length > 0) r.push({ label: keyBindings.drillIn.label, key: fmtBind(keyBindings.drillIn) }); r.push({ label: keyBindings.focus.label, key: fmtBind(keyBindings.focus) }); r.push({ label: keyBindings.promote.label, key: fmtBind(keyBindings.promote) }); r.push({ label: keyBindings.demote.label, key: fmtBind(keyBindings.demote) }); }
    if (viewParentId) r.push({ label: keyBindings.goUp.label, key: fmtBind(keyBindings.goUp) });
    if (selectedId || multiSelect.size > 0) r.push({ label: keyBindings.group.label, key: fmtBind(keyBindings.group) });
    r.push({ label: keyBindings.find.label, key: fmtBind(keyBindings.find) }); r.push({ label: keyBindings.decompose.label, key: fmtBind(keyBindings.decompose) }); r.push({ label: "settings", key: "?" });
    return r;
  }, [selectedId, editingId, searchOpen, taskInputNodeId, editingTaskId, editingBlockReason, viewParentId, keyBindings, nodes, remapOpen, focusNodeId, multiSelect]);

  if (!loaded) return <div style={{ height: "100vh", background: "#0a0a0b", display: "flex", alignItems: "center", justifyContent: "center", color: "#525252", fontFamily: F, fontSize: 13 }}>loading...</div>;

  const crumbs = getBreadcrumbs();

  const renderTask = (task, nodeId, co) => {
    const sm = SM[task.status]; const isET = editingTaskId === task.id; const isEB = editingBlockReason === task.id;
    return (
      <div key={task.id} style={{ padding: "2px 0" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11 }}>
          <button onClick={() => cycleTaskStatus(nodeId, task.id)} title={sm.label} style={{ background: "none", border: "none", color: sm.color, cursor: "pointer", fontSize: 10, padding: "0 2px", fontFamily: F, flexShrink: 0, lineHeight: 1 }}>{sm.icon}</button>
          {isET ? <input ref={taskEditRef} value={editingTaskText} onChange={(e) => setEditingTaskText(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commitEditTask(nodeId); } if (e.key === "Escape") { setEditingTaskId(null); setEditingTaskText(""); } }} onBlur={() => commitEditTask(nodeId)} style={{ background: "none", border: "none", outline: "none", color: co.text + "b0", fontSize: 11, fontFamily: F, flex: 1, padding: 0 }} />
          : <span onDoubleClick={(e) => { e.stopPropagation(); startEditTask(nodeId, task.id, task.text); }} style={{ color: task.status === "done" ? "#404040" : co.text + "b0", textDecoration: task.status === "done" ? "line-through" : "none", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", cursor: "text" }}>{task.text}</span>}
          <button onClick={() => deleteTask(nodeId, task.id)} style={{ background: "none", border: "none", color: "#ef444430", cursor: "pointer", fontSize: 10, padding: "0 2px" }} onMouseEnter={(e) => (e.target.style.color = "#ef4444")} onMouseLeave={(e) => (e.target.style.color = "#ef444430")}>×</button>
        </div>
        {task.status === "blocked" && <div style={{ marginLeft: 22, marginTop: 2 }}>{isEB ? <input ref={blockRef} value={blockReasonText} onChange={(e) => setBlockReasonText(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); commitBlock(nodeId); } if (e.key === "Escape") { setEditingBlockReason(null); setBlockReasonText(""); } }} onBlur={() => commitBlock(nodeId)} placeholder="why blocked?" style={{ background: "none", border: "none", borderBottom: "1px solid #ef444430", outline: "none", color: "#ef444490", fontSize: 10, fontFamily: F, width: "100%", padding: "1px 0" }} /> : <span onClick={(e) => { e.stopPropagation(); startEditBlock(task.id, task.blockReason); }} style={{ color: task.blockReason ? "#ef444470" : "#ef444430", fontSize: 10, cursor: "pointer", fontStyle: task.blockReason ? "normal" : "italic" }}>{task.blockReason || "add block reason..."}</span>}</div>}
        {task.status === "done" && task.completedAt && <div style={{ marginLeft: 22, color: "#333", fontSize: 9 }}>{fmtDate(task.completedAt)}</div>}
      </div>
    );
  };

  const PanelTaskItem = ({ task, node, path, showDate }) => (
    <div onClick={() => navigateToNode(node.id)} style={{ padding: "6px 12px", cursor: "pointer", borderBottom: "1px solid #0f0f11" }} onMouseEnter={(e) => (e.currentTarget.style.background = "#111113")} onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}>
      <div style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11 }}>
        <span style={{ color: SM[task.status].color, fontSize: 10, flexShrink: 0 }}>{SM[task.status].icon}</span>
        <span style={{ color: COLORS[node.colorIdx].text + (task.status === "done" ? "60" : "c0"), flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: task.status === "done" ? "line-through" : "none" }}>{task.text}</span>
      </div>
      {task.status === "blocked" && task.blockReason && <div style={{ color: "#ef444460", fontSize: 9, marginTop: 2, marginLeft: 17 }}>{task.blockReason}</div>}
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 2, marginLeft: 17 }}>
        <span style={{ color: "#404040", fontSize: 9, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{path.map((p) => p.title || "?").join(" › ")}</span>
        {showDate && task.completedAt && <span style={{ color: "#333", fontSize: 9, flexShrink: 0, marginLeft: 6 }}>{fmtDate(task.completedAt)}</span>}
      </div>
    </div>
  );

  return (
    <div style={{ height: "100vh", width: "100vw", background: bg, overflow: "hidden", position: "relative", fontFamily: F, cursor: isPanning ? "grabbing" : connectingFrom ? "crosshair" : "default", userSelect: "none", transition: "background 0.3s" }}>
      {vc && <div style={{ position: "fixed", top: 80, left: panelW, right: 0, bottom: 0, boxShadow: `inset 0 0 80px ${vc.accent}12`, pointerEvents: "none", zIndex: 2, borderTop: `2px solid ${vc.accent}20` }} />}
      {vpNode && <div style={{ position: "fixed", top: "50%", left: `calc(${panelW}px + 50%)`, transform: "translate(-50%,-50%)", fontSize: "clamp(48px,8vw,120px)", fontWeight: 800, color: vc.accent + "08", pointerEvents: "none", zIndex: 1, fontFamily: F }}>{vpNode.title || "untitled"}</div>}

      {/* Panel */}
      <div style={{ position: "fixed", top: 80, left: 0, bottom: 0, width: panelOpen ? 260 : 0, background: "#08080a", borderRight: panelOpen ? "1px solid #1a1a1c" : "none", zIndex: 99, overflow: "hidden", transition: "width 0.2s", display: "flex", flexDirection: "column" }}>
        {panelOpen && <>
          <div style={{ display: "flex", borderBottom: "1px solid #1a1a1c" }}>
            {["ready", "done"].map((tab) => <button key={tab} onClick={() => setPanelTab(tab)} style={{ flex: 1, background: "none", border: "none", borderBottom: panelTab === tab ? "2px solid #525252" : "2px solid transparent", color: panelTab === tab ? "#e2e8f0" : "#404040", fontSize: 11, padding: "8px 0", cursor: "pointer", fontFamily: F, textTransform: "uppercase", letterSpacing: "0.05em" }}>{tab === "ready" ? `ready (${allReadyTasks.length})` : `done (${doneToday.length})`}</button>)}
          </div>
          <div style={{ flex: 1, overflowY: "auto" }}>
            {panelTab === "ready" && <>
              {allReadyTasks.length === 0 && <div style={{ color: "#333", fontSize: 11, padding: "12px" }}>no ready tasks</div>}
              {allReadyTasks.map(({ task, node, path }) => <PanelTaskItem key={task.id} task={task} node={node} path={path} />)}
              {allBlockedTasks.length > 0 && <><div style={{ padding: "10px 12px 4px", borderTop: "1px solid #1a1a1c", marginTop: 4 }}><span style={{ color: SM.blocked.color, fontSize: 11, fontWeight: 600, letterSpacing: "0.05em" }}>{SM.blocked.icon} BLOCKED ({allBlockedTasks.length})</span></div>{allBlockedTasks.map(({ task, node, path }) => <PanelTaskItem key={task.id} task={task} node={node} path={path} />)}</>}
            </>}
            {panelTab === "done" && <>
              {doneToday.length === 0 && doneRecent.length === 0 && <div style={{ color: "#333", fontSize: 11, padding: "12px" }}>nothing completed yet</div>}
              {doneToday.length > 0 && <><div style={{ padding: "10px 12px 4px" }}><span style={{ color: SM.ready.color, fontSize: 11, fontWeight: 600, letterSpacing: "0.05em" }}>✓ TODAY ({doneToday.length})</span></div>{doneToday.map(({ task, node, path }) => <PanelTaskItem key={task.id} task={task} node={node} path={path} showDate />)}</>}
              {doneRecent.length > 0 && <><div style={{ padding: "10px 12px 4px", borderTop: doneToday.length > 0 ? "1px solid #1a1a1c" : "none", marginTop: doneToday.length > 0 ? 4 : 0 }}><span style={{ color: "#525252", fontSize: 11, fontWeight: 600, letterSpacing: "0.05em" }}>RECENT (7 DAYS)</span></div>{doneRecent.map(({ task, node, path }) => <PanelTaskItem key={task.id} task={task} node={node} path={path} showDate />)}</>}
            </>}
          </div>
        </>}
      </div>
      <button onClick={() => setPanelOpen(!panelOpen)} style={{ position: "fixed", top: 80, left: panelOpen ? 260 : 0, zIndex: 100, background: "#111113", border: "1px solid #1a1a1c", borderLeft: "none", borderTop: "none", color: "#525252", fontSize: 11, padding: "6px 5px", cursor: "pointer", borderRadius: "0 0 4px 0", fontFamily: F, transition: "left 0.2s" }}>{panelOpen ? "◂" : "▸"}</button>

      {/* Top bar */}
      <div style={{ position: "fixed", top: 40, left: 0, right: 0, height: 40, background: bg, borderBottom: `1px solid ${vc ? vc.accent + "20" : "#1a1a1c"}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 12px", paddingLeft: panelW + 12, zIndex: 100, transition: "background 0.3s, padding-left 0.2s" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 4, overflow: "hidden" }}>
          {crumbs.map((cr, i) => { const cc = cr.colorIdx !== undefined ? COLORS[cr.colorIdx] : null; return (<div key={cr.id || "r"} style={{ display: "flex", alignItems: "center", gap: 4 }}>{i > 0 && <span style={{ color: "#333", fontSize: 10 }}>›</span>}<button onClick={() => { setViewParentId(cr.id); setOffset({ x: 0, y: 0 }); setSelectedId(null); }} style={{ background: "none", border: "none", color: i === crumbs.length - 1 ? (cc?.text || "#e2e8f0") : "#525252", fontSize: 11, cursor: "pointer", padding: "2px 6px", borderRadius: 3, fontFamily: F, letterSpacing: i === 0 ? "0.1em" : 0, textTransform: i === 0 ? "uppercase" : "none", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} onMouseEnter={(e) => (e.target.style.background = "#1a1a1c")} onMouseLeave={(e) => (e.target.style.background = "none")}>{cr.title || (i === 0 ? "root" : "untitled")}</button></div>); })}
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {connectingFrom && <span style={{ color: "#f59e0b", fontSize: 11, marginRight: 4 }}>click to connect</span>}
          {viewParentId && <button onClick={() => { const p = getNode(viewParentId); setViewParentId(p?.parentId || null); setOffset({ x: 0, y: 0 }); setSelectedId(null); }} style={{ background: "none", border: `1px solid ${vc ? vc.accent + "30" : "#1a1a1c"}`, color: vc?.text || "#525252", fontSize: 11, padding: "4px 10px", cursor: "pointer", borderRadius: 3, fontFamily: F }}>← back</button>}
          <button onClick={() => { setDecomposeOpen(true); setDecomposeMode("manual"); setDecomposeText(""); setDecomposeContext(""); setDecomposeChat([]); setDecomposeNodes([]); setTimeout(() => decomposeRef.current?.focus(), 100); }} style={{ background: "none", border: `1px solid ${decomposeOpen ? "#f59e0b40" : "#1a1a1c"}`, color: decomposeOpen ? "#f59e0b" : "#525252", fontSize: 11, padding: "4px 10px", cursor: "pointer", borderRadius: 3, fontFamily: F }}>decompose</button>
          <button onClick={() => { setSearchOpen(!searchOpen); if (!searchOpen) setTimeout(() => searchRef.current?.focus(), 50); else setSearchQuery(""); }} style={{ background: "none", border: `1px solid ${searchOpen ? "#525252" : "#1a1a1c"}`, color: searchOpen ? "#e2e8f0" : "#525252", fontSize: 11, padding: "4px 10px", cursor: "pointer", borderRadius: 3, fontFamily: F }}>find</button>
          <button onClick={() => setOffset({ x: 0, y: 0 })} style={{ background: "none", border: "1px solid #1a1a1c", color: "#525252", fontSize: 11, padding: "4px 10px", cursor: "pointer", borderRadius: 3, fontFamily: F }}>center</button>
        </div>
      </div>

      {/* Search */}
      {searchOpen && <div style={{ position: "fixed", top: 80, right: 12, zIndex: 101, background: "#111113", border: "1px solid #1a1a1c", borderTop: "none", borderRadius: "0 0 6px 6px", padding: 8, width: 320, boxShadow: "0 8px 24px rgba(0,0,0,0.5)" }}>
        <input ref={searchRef} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="search..." style={{ background: "#0a0a0b", border: "1px solid #252528", borderRadius: 3, color: "#e2e8f0", fontSize: 12, fontFamily: F, padding: "6px 8px", width: "100%", outline: "none", boxSizing: "border-box" }} />
        {searchQuery && <div style={{ marginTop: 6, maxHeight: 400, overflowY: "auto" }}>
          {searchResults.length === 0 ? <div style={{ color: "#333", fontSize: 11, padding: 4 }}>no matches</div> : searchResults.map((n, idx) => { const anc = getAncestors(n.id); const ch = getChildren(n.id).slice(0, 3); const nc = COLORS[n.colorIdx]; return (<div key={n.id} onClick={() => { navigateToNode(n.id); setSearchOpen(false); setSearchQuery(""); }} style={{ padding: "8px 6px", cursor: "pointer", borderRadius: 4, borderBottom: idx < searchResults.length - 1 ? "1px solid #1a1a1c" : "none" }} onMouseEnter={(e) => (e.currentTarget.style.background = "#1a1a1c")} onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}><div style={{ fontSize: 11, lineHeight: "1.7" }}>{anc.map((a, i) => <div key={a.id} style={{ paddingLeft: i * 14, display: "flex", alignItems: "center", gap: 5, color: "#404040" }}><span style={{ color: COLORS[a.colorIdx].accent + "60", fontSize: 8 }}>●</span>{a.title || "untitled"}</div>)}<div style={{ paddingLeft: anc.length * 14, display: "flex", alignItems: "center", gap: 5, color: nc.text, fontWeight: 600 }}><span style={{ color: nc.accent, fontSize: 8 }}>●</span>{n.title || "untitled"}{readyCounts[n.id] > 0 && <span style={{ color: SM.ready.color, fontSize: 10, fontWeight: 400 }}>{readyCounts[n.id]} ready</span>}</div>{ch.map((c) => <div key={c.id} style={{ paddingLeft: (anc.length + 1) * 14, display: "flex", alignItems: "center", gap: 5, color: "#404040" }}><span style={{ color: COLORS[c.colorIdx].accent + "60", fontSize: 8 }}>●</span>{c.title || "untitled"}</div>)}</div></div>); })}
        </div>}
      </div>}

      {/* Remap */}
      {remapOpen && <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%,-50%)", zIndex: 200, background: "#111113", border: "1px solid #252528", borderRadius: 8, padding: 20, width: 360, boxShadow: "0 16px 48px rgba(0,0,0,0.6)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}><span style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 600 }}>key bindings</span><button onClick={() => setRemapOpen(false)} style={{ background: "none", border: "none", color: "#525252", cursor: "pointer", fontSize: 14 }}>×</button></div>
        {Object.entries(keyBindings).map(([action, bind]) => <div key={action} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #1a1a1c" }}><span style={{ color: "#a0a0a0", fontSize: 11 }}>{bind.label}</span><button onClick={() => setRemapTarget(action)} style={{ background: remapTarget === action ? "#1e40af30" : "#1a1a1c", border: `1px solid ${remapTarget === action ? "#3b82f6" : "#252528"}`, color: remapTarget === action ? "#93c5fd" : "#e2e8f0", fontSize: 11, padding: "3px 10px", borderRadius: 3, cursor: "pointer", fontFamily: F, minWidth: 80, textAlign: "center" }}>{remapTarget === action ? "press key..." : fmtBind(bind)}</button></div>)}
        <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between" }}><button onClick={() => setKeyBindings(DEFAULT_KEYS)} style={{ background: "none", border: "1px solid #1a1a1c", color: "#525252", fontSize: 10, padding: "4px 10px", borderRadius: 3, cursor: "pointer", fontFamily: F }}>reset defaults</button><button onClick={() => setRemapOpen(false)} style={{ background: "#1e40af30", border: "1px solid #3b82f640", color: "#93c5fd", fontSize: 10, padding: "4px 10px", borderRadius: 3, cursor: "pointer", fontFamily: F }}>done</button></div>
      </div>}

      {/* Empty */}
      {visibleNodes.length === 0 && !vpNode && <div style={{ position: "fixed", top: "50%", left: `calc(${panelW}px + 50%)`, transform: "translate(-50%,-50%)", color: "#2a2a2c", fontSize: 13, textAlign: "center", lineHeight: "2.2", zIndex: 3, pointerEvents: "none" }}>double-click to place a node</div>}
      {visibleNodes.length === 0 && vpNode && <div style={{ position: "fixed", top: "50%", left: `calc(${panelW}px + 50%)`, transform: "translate(-50%,-50%)", color: vc.accent + "30", fontSize: 13, textAlign: "center", zIndex: 3, pointerEvents: "none" }}>empty — double-click to add inside {vpNode.title || "this node"}</div>}

      {/* Canvas */}
      <div ref={canvasRef} className="ci" style={{ position: "absolute", top: 80, left: panelW, right: 0, bottom: 0, overflow: "hidden", transition: "left 0.2s", touchAction: "none" }} onDoubleClick={handleCanvasDblClick} onMouseDown={handleCanvasMouseDown} onTouchStart={handleCanvasTouchStart}>
        <div className="ci" style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, backgroundImage: `radial-gradient(circle, ${gridC} 1px, transparent 1px)`, backgroundSize: "40px 40px", backgroundPosition: `${offset.x % 40}px ${offset.y % 40}px`, pointerEvents: "none" }} />
        <svg style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 1, pointerEvents: "none" }}>
          {visCon.map((c, ci) => { const f = getCenter(c.from), t = getCenter(c.to); const lc = vc ? vc.accent + "90" : "#888"; const llc = vc ? vc.accent + "b0" : "#aaa";
            const fx = f.x + offset.x, fy = f.y + offset.y, tx = t.x + offset.x, ty = t.y + offset.y;
            const mx = (fx + tx) / 2, my = (fy + ty) / 2;
            const ddx = tx - fx, ddy = ty - fy, len = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
            const ux = ddx / len, uy = ddy / len;
            const aLen = 16, aW = 8;
            const tipX = tx - ux * 2, tipY = ty - uy * 2;
            const p1x = tipX - ux * aLen + uy * aW, p1y = tipY - uy * aLen - ux * aW;
            const p2x = tipX - ux * aLen - uy * aW, p2y = tipY - uy * aLen + ux * aW;
            const isEditing = editingConIdx === ci;
            return (<g key={ci}>
              <line x1={fx} y1={fy} x2={tx} y2={ty} stroke={lc} strokeWidth="2" strokeOpacity="0.3" />
              <line x1={fx} y1={fy} x2={tx} y2={ty} stroke={lc} strokeWidth="2.5" strokeDasharray="8,12" style={{ animation: "flowDash 0.8s linear infinite" }} />
              <circle cx={fx} cy={fy} r="5" fill={lc} stroke="none" />
              <path d={`M${tipX},${tipY}L${p1x},${p1y}L${p2x},${p2y}Z`} fill={lc} stroke="none" />
              {c.label && !isEditing && <><rect x={mx - (c.label.length * 3.2) - 6} y={my - 17} width={(c.label.length * 6.4) + 12} height={16} rx="4" fill="#0a0a0be0" stroke={lc} strokeWidth="0.5" />
                <text x={mx} y={my - 6} fill={llc} fontSize="10" fontFamily={F} textAnchor="middle" fontWeight="600" style={{ pointerEvents: "auto", cursor: "pointer" }} onClick={(e) => { e.stopPropagation(); setEditingConIdx(ci); setConLabelText(c.label); setTimeout(() => conLabelRef.current?.focus(), 50); }}>{c.label}</text></>}
              <line x1={fx} y1={fy} x2={tx} y2={ty} stroke="transparent" strokeWidth="20" style={{ pointerEvents: "stroke", cursor: "pointer" }}
                onClick={(e) => { e.stopPropagation(); if (e.shiftKey) { const o = visCon[ci]; setConnections((p) => p.filter((x) => !(x.from === o.from && x.to === o.to))); } else { setEditingConIdx(ci); setConLabelText(c.label || ""); setTimeout(() => conLabelRef.current?.focus(), 50); } }} />
            </g>); })}
        </svg>

        {/* Connection label editor */}
        {editingConIdx !== null && visCon[editingConIdx] && (() => {
          const ec = visCon[editingConIdx]; const ef = getCenter(ec.from), et = getCenter(ec.to);
          const emx = (ef.x + et.x) / 2 + offset.x, emy = (ef.y + et.y) / 2 + offset.y - 20;
          return <div style={{ position: "absolute", left: emx - 80, top: emy - 14, zIndex: 60, display: "flex", gap: 4, alignItems: "center" }} onMouseDown={(e) => e.stopPropagation()}>
            <input ref={conLabelRef} value={conLabelText} onChange={(e) => setConLabelText(e.target.value)} placeholder="label..." onKeyDown={(e) => {
              if (e.key === "Enter") { setConnections((p) => p.map((x, xi) => { const ri = connections.indexOf(visCon[editingConIdx]); return xi === ri ? { ...x, label: conLabelText.trim() } : x; })); setEditingConIdx(null); }
              if (e.key === "Escape") setEditingConIdx(null);
            }} onBlur={() => { setConnections((p) => p.map((x, xi) => { const ri = connections.indexOf(visCon[editingConIdx]); return xi === ri ? { ...x, label: conLabelText.trim() } : x; })); setEditingConIdx(null); }}
            style={{ background: "#111113", border: "1px solid #252528", borderRadius: 4, color: "#e2e8f0", fontSize: 10, fontFamily: F, padding: "3px 8px", width: 160, outline: "none" }} />
            <button onClick={() => { const o = visCon[editingConIdx]; setConnections((p) => p.filter((x) => !(x.from === o.from && x.to === o.to))); setEditingConIdx(null); }} style={{ background: "none", border: "none", color: "#ef444460", fontSize: 12, cursor: "pointer", padding: "2px" }}>×</button>
          </div>;
        })()}

        {/* Group backgrounds */}
        {groups.map((grp) => {
          const memberNodes = grp.nodeIds.map((id) => visibleNodes.find((n) => n.id === id)).filter(Boolean);
          if (memberNodes.length === 0) return null;
          const pad = 24;
          const minX = Math.min(...memberNodes.map((n) => n.x)) - pad;
          const minY = Math.min(...memberNodes.map((n) => n.y)) - pad - 28;
          const maxX = Math.max(...memberNodes.map((n) => n.x)) + 200 + pad;
          const maxY = Math.max(...memberNodes.map((n) => n.y)) + 140 + pad;
          const isDragging = dragState && grp.nodeIds.includes(dragState.id);
          return (
            <div key={grp.id} style={{ position: "absolute", left: minX + offset.x, top: minY + offset.y, width: maxX - minX, height: maxY - minY, background: grp.color + "0c", border: `2px solid ${isDragging ? grp.color + "60" : grp.color + "30"}`, borderRadius: 12, zIndex: 2, transition: isDragging ? "none" : "border-color 0.2s" }}>
              {/* Draggable group header */}
              <div onMouseDown={(e) => {
                e.stopPropagation();
                const origins = {}; grp.nodeIds.forEach((id) => { const n = nodes.find((x) => x.id === id); if (n) origins[id] = { x: n.x, y: n.y }; });
                setDragState({ id: grp.nodeIds[0], ids: grp.nodeIds, sx: e.clientX, sy: e.clientY, origins });
              }} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 10px", cursor: "grab", borderBottom: `1px solid ${grp.color}15`, borderRadius: "10px 10px 0 0", background: grp.color + "08" }}>

                {groupConfirmDelete === grp.id ? <span style={{ display: "flex", gap: 4, alignItems: "center" }} onMouseDown={(e) => e.stopPropagation()}>
                  <button onClick={() => { const rm = new Set(grp.nodeIds); setNodes((p) => p.filter((n) => !rm.has(n.id))); setConnections((p) => p.filter((c) => !rm.has(c.from) && !rm.has(c.to))); setGroups((p) => p.filter((g) => g.id !== grp.id)); setGroupConfirmDelete(null); }} style={{ background: "#ef444420", border: "1px solid #ef444440", color: "#ef4444", fontSize: 9, padding: "1px 6px", borderRadius: 3, cursor: "pointer", fontFamily: F }}>delete all</button>

                  <button onClick={() => setGroupConfirmDelete(null)} onMouseDown={(e) => e.stopPropagation()} style={{ background: "none", border: "none", color: "#555", fontSize: 10, cursor: "pointer" }}>cancel</button>
                </span>
                : <button onClick={(e) => { e.stopPropagation(); setGroupConfirmDelete(grp.id); }} onMouseDown={(e) => e.stopPropagation()} style={{ background: "none", border: "none", color: "#ef444430", fontSize: 11, cursor: "pointer" }}>×</button>}
              </div>
            </div>

        })}

        {visibleNodes.map((node) => {
          const co = COLORS[node.colorIdx]; const isSel = selectedId === node.id; const isEd = editingId === node.id;
          const isMSel = multiSelect.has(node.id);
          const isGrpDrag = dragState && dragState.origins && dragState.origins[node.id] && dragState.id !== node.id;

          const isMatch = searchOpen && searchQuery && searchIds.has(node.id);

              <div style={{ padding: "8px 10px", display: "flex", alignItems: "center", gap: 6, borderBottom: node.collapsed ? "none" : `1px solid ${co.border}30`, minHeight: 34 }}>

                {rc > 0 && <span style={{ background: SM.ready.color + "20", border: `1px solid ${SM.ready.color}40`, color: SM.ready.color, fontSize: 10, borderRadius: 3, padding: "1px 5px", fontFamily: F, flexShrink: 0 }}>{rc}</span>}

                : <span style={{ color: node.title ? co.text : co.text + "30", fontSize: 13, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{node.title || "untitled"}</span>}
                {isSel && !(isEd && editingField === "title") && <div style={{ display: "flex", gap: 1, flexShrink: 0 }}>
                  <button onClick={(e) => { e.stopPropagation(); setColorPickerNodeId(colorPickerNodeId === node.id ? null : node.id); }} style={{ background: "none", border: "none", color: co.text + "50", cursor: "pointer", fontSize: 14, padding: "2px 3px" }}>●</button>
                  <button onClick={(e) => { e.stopPropagation(); setConnectingFrom(node.id); }} style={{ background: "none", border: "none", color: co.text + "50", cursor: "pointer", fontSize: 12, padding: "2px 3px" }}>◯</button>
                  <button onClick={(e) => { e.stopPropagation(); updateNode(node.id, { collapsed: !node.collapsed }); }} style={{ background: "none", border: "none", color: co.text + "50", cursor: "pointer", fontSize: 12, padding: "2px 3px" }}>{node.collapsed ? "▸" : "▾"}</button>
                  <button onClick={(e) => { e.stopPropagation(); deleteNode(node.id); }} style={{ background: "none", border: "none", color: "#ef444460", cursor: "pointer", fontSize: 12, padding: "2px 3px" }}>×</button>
                </div>}
              </div>
              {colorPickerNodeId === node.id && (
                <div style={{ position: "absolute", top: -36, left: 0, display: "flex", gap: 4, padding: "6px 8px", background: "#111113", border: "1px solid #252528", borderRadius: 6, boxShadow: "0 4px 16px rgba(0,0,0,0.5)", zIndex: 60 }} onMouseDown={(e) => e.stopPropagation()}>

              {!node.collapsed && <div style={{ padding: "8px 10px", minHeight: 20 }} onDoubleClick={(e) => { e.stopPropagation(); setEditingId(node.id); setEditingField("notes"); setTimeout(() => notesRef.current?.focus(), 50); }}>
                {isEd && editingField === "notes" ? <textarea ref={notesRef} value={node.notes} onChange={(e) => updateNode(node.id, { notes: e.target.value })} onKeyDown={(e) => fieldKey(e, node.id, "notes")} onBlur={() => { setEditingId(null); setEditingField(null); }} placeholder="notes..." rows={3} style={{ background: "none", border: "none", outline: "none", color: co.text + "b0", fontSize: 12, fontFamily: F, width: "100%", resize: "vertical", padding: 0, lineHeight: "1.6" }} />

              </div>}

              </div>}
            </div>
          );
        })}
      </div>

      {/* Decompose Overlay */}
      {decomposeOpen && (
        <div tabIndex={-1} onKeyDown={(e) => { if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); const hasWork = decomposeNodes.length > 0 || decomposeText.trim().length > 0 || decomposeChat.length > 0; if (hasWork && !decomposeConfirmClose) { setDecomposeConfirmClose(true); } else { setDecomposeOpen(false); setDecomposeConfirmClose(false); } } }} style={{ position: "fixed", top: 40, left: 0, right: 0, bottom: 0, background: "#0a0a0bf0", zIndex: 400, display: "flex", fontFamily: F, overflow: "hidden", outline: "none" }}>

            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexShrink: 0 }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ color: "#f59e0b", fontSize: 14, fontWeight: 700 }}>decompose</span>
                <div style={{ display: "flex", gap: 2, background: "#111113", borderRadius: 4, padding: 2 }}>
                  <button onClick={() => setDecomposeMode("manual")} style={{ background: decomposeMode === "manual" ? "#252528" : "none", border: "none", color: decomposeMode === "manual" ? "#e2e8f0" : "#525252", fontSize: 10, padding: "4px 10px", borderRadius: 3, cursor: "pointer", fontFamily: F }}>manual</button>
                  <button onClick={() => setDecomposeMode("claude")} style={{ background: decomposeMode === "claude" ? "#252528" : "none", border: "none", color: decomposeMode === "claude" ? "#e2e8f0" : "#525252", fontSize: 10, padding: "4px 10px", borderRadius: 3, cursor: "pointer", fontFamily: F }}>claude</button>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {decomposeNodes.length > 0 && <button onClick={() => {
                  const pn = viewParentId ? getNode(viewParentId) : null;
                  const baseX = 60, baseY = 60;
                  const newNodes = decomposeNodes.map((dn, i) => ({
                    id: uid(), parentId: viewParentId, x: dn.x || (baseX + (i % 3) * 240), y: dn.y || (baseY + Math.floor(i / 3) * 160),
                    title: dn.title || "", notes: dn.notes || "", colorIdx: dn.colorIdx !== undefined ? dn.colorIdx : (pn?.colorIdx || 0),
                    collapsed: false, tasks: (dn.tasks || []).map((t) => ({ id: uid(), text: t.text || t, status: t.status || "ready", blockReason: t.blockReason || "", completedAt: null })), created: Date.now()
                  }));
                  setNodes((p) => [...p, ...newNodes]);
                  // Wire connections from decompose
                  const idMap = {}; decomposeNodes.forEach((dn, i) => { idMap[dn._tmpId || i] = newNodes[i].id; });
                  const newCons = (decomposeNodes.reduce((acc, dn) => { if (dn._connections) dn._connections.forEach((c) => { if (idMap[c.to] !== undefined) acc.push({ from: idMap[dn._tmpId], to: idMap[c.to], label: c.label || "" }); }); return acc; }, []));
                  if (newCons.length > 0) setConnections((p) => [...p, ...newCons]);
                  setDecomposeOpen(false); setDecomposeConfirmClose(false);
                }} style={{ background: "#f59e0b20", border: "1px solid #f59e0b40", color: "#f59e0b", fontSize: 11, padding: "6px 16px", borderRadius: 4, cursor: "pointer", fontFamily: F }}>place {decomposeNodes.length} nodes on canvas</button>}

                  const hasWork = decomposeNodes.length > 0 || decomposeText.trim().length > 0 || decomposeChat.length > 0;

                  else { setDecomposeOpen(false); setDecomposeConfirmClose(false); }
                }} style={{ background: "none", border: "1px solid #252528", color: "#525252", fontSize: 11, padding: "6px 12px", borderRadius: 4, cursor: "pointer", fontFamily: F }}>cancel (esc)</button>

                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <button onClick={() => {
                      const sel = window.getSelection().toString().trim();
                      if (!sel) { const btn = document.getElementById("sel-btn"); if (btn) { btn.style.borderColor = "#ef444460"; btn.style.color = "#ef4444"; setTimeout(() => { btn.style.borderColor = "#3b82f640"; btn.style.color = "#93c5fd"; }, 800); } return; }
                      const tmpId = decomposeNodes.length;
                      setDecomposeNodes((p) => [...p, { _tmpId: tmpId, title: "", notes: sel, colorIdx: 0, tasks: [], x: 60 + (tmpId % 3) * 240, y: 60 + Math.floor(tmpId / 3) * 160, _connections: [] }]);
                    }} id="sel-btn" style={{ background: "#1e40af20", border: "1px solid #3b82f640", color: "#93c5fd", fontSize: 11, padding: "8px 16px", borderRadius: 4, cursor: "pointer", fontFamily: F, transition: "all .2s" }}>② selection → node</button>
                    <span style={{ color: "#333", fontSize: 10 }}>highlight text first</span>
                    <button onClick={() => { const tmpId = decomposeNodes.length; setDecomposeNodes((p) => [...p, { _tmpId: tmpId, title: "", notes: "", colorIdx: 0, tasks: [], x: 60 + (tmpId % 3) * 240, y: 60 + Math.floor(tmpId / 3) * 160, _connections: [] }]); }} style={{ background: "#252528", border: "1px solid #333", color: "#888", fontSize: 11, padding: "8px 12px", borderRadius: 4, cursor: "pointer", fontFamily: F, marginLeft: "auto" }}>+ blank</button>

                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8, overflow: "hidden" }}>

                          <button onClick={() => setDecomposeNodes((p) => p.filter((_, ni) => ni !== i))} style={{ background: "none", border: "none", color: "#ef444430", fontSize: 10, cursor: "pointer", padding: "2px 4px", fontFamily: F, marginLeft: "auto" }}>×</button>
                        </div>

                      Each piece becomes a component on your canvas<br/>
                      Name them, add tasks, then hit <span style={{ color: "#f59e0b" }}>place</span>
                    </div>}
                  </div>
                </div>
              </div>
            )}

            {/* Claude Mode */}
            {decomposeMode === "claude" && (
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 12, overflow: "hidden" }}>
                {decomposeChat.length === 0 && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    <span style={{ color: "#525252", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em" }}>① paste the ticket or describe the feature</span>
                    <textarea ref={decomposeRef} value={decomposeText} onChange={(e) => setDecomposeText(e.target.value)} placeholder="Paste the full ticket, design doc, or describe what you're building. Claude will propose a systems schematic — components, data flow, dependencies — not a task list." rows={6} style={{ background: "#111113", border: "1px solid #1a1a1c", borderRadius: 6, color: "#e2e8f0", fontSize: 12, fontFamily: F, padding: 12, resize: "vertical", outline: "none", lineHeight: "1.6" }} />
                    <span style={{ color: "#525252", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em" }}>② what do you already know? (optional)</span>
                    <input value={decomposeContext} onChange={(e) => setDecomposeContext(e.target.value)} placeholder="Skip what you understand so Claude focuses on what's fuzzy..." style={{ background: "#111113", border: "1px solid #1a1a1c", borderRadius: 6, color: "#888", fontSize: 11, fontFamily: F, padding: "8px 12px", outline: "none" }} />
                  </div>

                <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
                  {decomposeChat.map((msg, i) => (
                    <div key={i} style={{ padding: "8px 12px", background: msg.role === "user" ? "#1a1a1c" : "#111113", borderRadius: 6, border: "1px solid #1a1a1c" }}>
                      <span style={{ color: msg.role === "user" ? "#e2e8f0" : "#a855f7", fontSize: 10, fontWeight: 600 }}>{msg.role === "user" ? "you" : "claude"}</span>
                      <div style={{ color: "#ccc", fontSize: 11, lineHeight: "1.6", marginTop: 4, whiteSpace: "pre-wrap" }}>{msg.content}</div>
                    </div>
                  ))}
                  {decomposeLoading && <div style={{ color: "#a855f760", fontSize: 11, padding: 8 }}>thinking...</div>}
                </div>
                {(() => {
                  const apiKey = loadJSON("mototracker_data", {}).apiKey || "";
                  const hasKey = !!apiKey;
                  const sendToApi = (userMsg) => {
                    if (!hasKey) return;
                    const sysPrompt = `You are helping decompose a ticket/feature into a systems schematic — NOT a project plan. Think components in an architecture, data flow, dependencies. Output JSON when the user says "place" or when you have a clear schematic:
{"nodes":[{"title":"short name","notes":"what this component does","tasks":[{"text":"task","status":"ready","blockReason":""}],"colorIdx":0}],"connections":[{"fromIdx":0,"toIdx":1,"label":"data flow label"}]}
First task on the first component should be the smallest possible physical action (under 2 minutes). Blocked tasks need blockReason. Keep titles 2-5 words. Notes explain what the component does in the system. Until you output JSON, have a conversation — ask what's fuzzy, propose components, refine. Be concise.`;
                    const msgs = [{ role: "user", content: userMsg }];
                    const fullMsgs = decomposeChat.map((m) => ({ role: m.role === "you" ? "user" : m.role, content: m.content }));
                    fullMsgs.push({ role: "user", content: userMsg });
                    setDecomposeChat((p) => [...p, { role: "user", content: userMsg }]);
                    setDecomposeLoading(true);
                    fetch("https://api.anthropic.com/v1/messages", {
                      method: "POST", headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
                      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2000, system: sysPrompt, messages: fullMsgs })
                    }).then((r) => r.json()).then((d) => {
                      const txt = d.content?.[0]?.text || "Error";
                      setDecomposeChat((p) => [...p, { role: "assistant", content: txt }]);
                      setDecomposeLoading(false);
                      // Try parse JSON from response
                      try {
                        const jsonMatch = txt.match(/\{[\s\S]*"nodes"[\s\S]*\}/);
                        if (jsonMatch) {
                          const parsed = JSON.parse(jsonMatch[0]);
                          if (parsed.nodes) {
                            const dns = parsed.nodes.map((n, i) => ({
                              _tmpId: i, title: n.title || "", notes: n.notes || "", colorIdx: n.colorIdx || 0,
                              tasks: (n.tasks || []).map((t) => typeof t === "string" ? { text: t, status: "ready", blockReason: "" } : t),
                              x: 60 + (i % 3) * 240, y: 60 + Math.floor(i / 3) * 160,
                              _connections: (parsed.connections || []).filter((c) => c.fromIdx === i).map((c) => ({ to: c.toIdx, label: c.label || "" }))
                            }));
                            setDecomposeNodes(dns);
                          }
                        }
                      } catch (e) { /* not JSON yet, conversation continues */ }
                    }).catch((e) => { setDecomposeChat((p) => [...p, { role: "assistant", content: "Error: " + e.message }]); setDecomposeLoading(false); });
                  };
                  return (
                    <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                      {decomposeChat.length === 0 ? (
                        <button onClick={() => { if (!decomposeText.trim()) return; const msg = decomposeText + (decomposeContext ? "\n\nContext I already have: " + decomposeContext : ""); sendToApi(msg); }} disabled={!hasKey || !decomposeText.trim() || decomposeLoading} style={{ flex: 1, background: hasKey ? "#a855f720" : "#1a1a1c", border: "1px solid " + (hasKey ? "#a855f740" : "#252528"), color: hasKey ? "#a855f7" : "#333", fontSize: 11, padding: "10px", borderRadius: 4, cursor: hasKey ? "pointer" : "default", fontFamily: F, opacity: (!hasKey || !decomposeText.trim()) ? 0.4 : 1 }}>{hasKey ? "③ send to claude — build the schematic" : "needs API key (add in Drydock settings)"}</button>
                      ) : (
                        <input id="decompose-followup" placeholder="Refine the schematic... or type 'place' to generate nodes" onKeyDown={(e) => { if (e.key === "Enter" && e.target.value.trim()) { sendToApi(e.target.value.trim()); e.target.value = ""; } }} style={{ flex: 1, background: "#111113", border: "1px solid #1a1a1c", borderRadius: 4, color: "#e2e8f0", fontSize: 11, fontFamily: F, padding: "8px 12px", outline: "none" }} />
                      )}
                    </div>
                  );
                })()}
                {decomposeNodes.length > 0 && <div style={{ flexShrink: 0, padding: "8px 0", borderTop: "1px solid #1a1a1c" }}>
                  <span style={{ color: "#22c55e", fontSize: 11 }}>Schematic ready — {decomposeNodes.length} components. Hit "place" in the top right to drop them on your canvas.</span>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginTop: 4 }}>{decomposeNodes.map((dn, i) => <span key={i} style={{ background: "#22c55e10", border: "1px solid #22c55e30", color: "#22c55e", fontSize: 10, padding: "2px 8px", borderRadius: 3 }}>{dn.title || "untitled"}</span>)}</div>
                </div>}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Focus Mode Overlay */}
      {focusNodeId && (() => {
        const fn = nodes.find((n) => n.id === focusNodeId);
        if (!fn) return null;
        const co = COLORS[fn.colorIdx];
        const readyTasks = (fn.tasks || []).filter((t) => t.status === "ready");
        const firstReady = readyTasks[0];
        const [showExit, setShowExit_] = [focusExitNote !== null && focusStart && focusElapsed > 5, null];
        return (
          <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#0a0a0b", zIndex: 500, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: F, gap: 32, padding: 40 }}>
            <div style={{ color: co.accent + "40", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.15em" }}>focus</div>
            <div style={{ color: co.text, fontSize: 24, fontWeight: 700, textAlign: "center" }}>{fn.title || "untitled"}</div>
            <div style={{ color: "#22c55e", fontSize: 48, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{fmtTimer(focusElapsed)}</div>
            {firstReady && <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 20px", background: SM.ready.color + "10", border: "1px solid " + SM.ready.color + "30", borderRadius: 8 }}>
              <span style={{ color: SM.ready.color, fontSize: 12 }}>{SM.ready.icon}</span>
              <span style={{ color: co.text + "c0", fontSize: 14 }}>{firstReady.text}</span>
              <button onClick={() => { cycleTaskStatus(focusNodeId, firstReady.id); }} style={{ background: "none", border: "1px solid " + SM.ready.color + "40", color: SM.ready.color, fontSize: 10, padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontFamily: F, marginLeft: 8 }}>done</button>
            </div>}
            {readyTasks.length > 1 && <div style={{ color: "#404040", fontSize: 11 }}>{readyTasks.length - 1} more ready</div>}
            <div style={{ width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 12 }}>
              <input ref={microRef} value={focusMicroStep} onChange={(e) => setFocusMicroStep(e.target.value)} placeholder="What's the first physical action?" style={{ background: "none", border: "none", borderBottom: "1px solid " + co.accent + "30", outline: "none", color: co.text + "b0", fontSize: 13, fontFamily: F, padding: "8px 0", textAlign: "center", width: "100%" }} />
              <input ref={exitNoteRef} value={focusExitNote} onChange={(e) => setFocusExitNote(e.target.value)} placeholder="Where you left off..." style={{ background: "none", border: "none", borderBottom: "1px solid #333", outline: "none", color: "#888", fontSize: 11, fontFamily: F, padding: "6px 0", textAlign: "center", width: "100%" }} />
            </div>
            <button onClick={() => exitFocus(true)} style={{ background: "none", border: "1px solid #333", color: "#666", fontSize: 11, padding: "8px 24px", borderRadius: 6, cursor: "pointer", fontFamily: F, marginTop: 12 }}>exit focus (esc)</button>
          </div>
        );
      })()}

      {/* Daily Intention Prompt */}
      {showIntentionPrompt && !focusNodeId && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "#0a0a0bee", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: F }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 16, alignItems: "center", maxWidth: 400, padding: 40 }}>
            <div style={{ color: "#404040", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.15em" }}>new day</div>
            <div style={{ color: "#e2e8f0", fontSize: 18, fontWeight: 600, textAlign: "center" }}>What's the one thing today?</div>
            <input ref={intentionRef} value={dailyIntention} onChange={(e) => setDailyIntention(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && dailyIntention.trim()) { setIntentionDate(todayStr); setShowIntentionPrompt(false); } if (e.key === "Escape") setShowIntentionPrompt(false); }} placeholder="One thing..." autoFocus style={{ background: "none", border: "none", borderBottom: "2px solid #f59e0b40", outline: "none", color: "#f59e0b", fontSize: 16, fontFamily: F, padding: "8px 0", textAlign: "center", width: "100%", maxWidth: 320 }} />
            <div style={{ display: "flex", gap: 12, marginTop: 8 }}>
              <button onClick={() => setShowIntentionPrompt(false)} style={{ background: "none", border: "1px solid #222", color: "#555", fontSize: 11, padding: "6px 16px", borderRadius: 4, cursor: "pointer", fontFamily: F }}>skip</button>
              <button onClick={() => { if (dailyIntention.trim()) { setIntentionDate(todayStr); } setShowIntentionPrompt(false); }} style={{ background: "#f59e0b20", border: "1px solid #f59e0b40", color: "#f59e0b", fontSize: 11, padding: "6px 16px", borderRadius: 4, cursor: "pointer", fontFamily: F }}>set</button>
            </div>
          </div>
        </div>
      )}

      {/* Intention in top bar */}
      {dailyIntention && intentionDate === todayStr && !focusNodeId && (
        <div style={{ position: "fixed", top: 80, left: panelW, right: 0, display: "flex", justifyContent: "center", zIndex: 99, pointerEvents: "none" }}>
          <div style={{ background: "#0a0a0bc0", border: "1px solid #f59e0b20", borderTop: "none", borderRadius: "0 0 8px 8px", padding: "4px 16px", pointerEvents: "auto", cursor: "pointer" }} onClick={() => setShowIntentionPrompt(true)}>
            <span style={{ color: "#f59e0b80", fontSize: 11 }}>{dailyIntention}</span>
          </div>
        </div>
      )}

      {/* Legend */}
      {legendVisible && <div style={{ position: "fixed", bottom: momentumPct > 0 ? 18 : 10, left: panelW, right: 0, display: "flex", justifyContent: "center", zIndex: 100, pointerEvents: "none" }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center", padding: "4px 12px", background: "#0a0a0bc0", borderRadius: 6, border: "1px solid #1a1a1c", pointerEvents: "auto" }}>
          {contextKeys.map((k, i) => <span key={i} style={{ fontSize: 10, color: "#404040" }}><span style={{ color: "#606060", background: "#1a1a1c", padding: "1px 5px", borderRadius: 2, marginRight: 4, fontFamily: F }}>{k.key}</span>{k.label}</span>)}
          <span onClick={() => setLegendVisible(false)} style={{ fontSize: 10, color: "#333", cursor: "pointer", marginLeft: 4 }}>×</span>
        </div>
      </div>}
      {!legendVisible && <button onClick={() => setLegendVisible(true)} style={{ position: "fixed", bottom: momentumPct > 0 ? 18 : 10, right: 10, background: "#111113", border: "1px solid #1a1a1c", color: "#404040", fontSize: 10, padding: "4px 8px", borderRadius: 3, cursor: "pointer", fontFamily: F, zIndex: 100 }}>?</button>}

      {/* Momentum Strip */}
      {!focusNodeId && (todayDoneCount > 0 || todayFocusMins > 0) && (
        <div style={{ position: "fixed", bottom: 0, left: panelW, right: 0, height: 6, background: "#111113", zIndex: 101, transition: "left 0.2s" }}>
          <div style={{ height: "100%", width: momentumPct + "%", background: "linear-gradient(90deg, #22c55e40, #22c55e)", borderRadius: "0 3px 3px 0", transition: "width 0.5s ease" }} />
        </div>
      )}

      {/* Mobile action bar */}
      {isMobile && !focusNodeId && !editingId && !remapOpen && !showIntentionPrompt && (
        <div style={{ position: "fixed", bottom: 20, right: 16, zIndex: 200, display: "flex", flexDirection: "column", gap: 10, alignItems: "flex-end" }}>
          {selectedId && (
            <div style={{ display: "flex", gap: 8 }}>
              {nodes.filter((n) => n.parentId === selectedId).length > 0 && <button onClick={() => { setViewParentId(selectedId); setOffset({ x: 0, y: 0 }); setSelectedId(null); }} style={{ width: 44, height: 44, borderRadius: 22, background: "#1e40af50", border: "1px solid #3b82f640", color: "#93c5fd", fontSize: 14, cursor: "pointer", fontFamily: F, display: "flex", alignItems: "center", justifyContent: "center" }}>↓</button>}
              <button onClick={() => enterFocus(selectedId)} style={{ width: 44, height: 44, borderRadius: 22, background: "#22c55e20", border: "1px solid #22c55e40", color: "#22c55e", fontSize: 18, cursor: "pointer", fontFamily: F, display: "flex", alignItems: "center", justifyContent: "center" }}>◎</button>
              <button onClick={() => quickChild(selectedId)} style={{ width: 44, height: 44, borderRadius: 22, background: "#a855f720", border: "1px solid #a855f740", color: "#a855f7", fontSize: 18, cursor: "pointer", fontFamily: F, display: "flex", alignItems: "center", justifyContent: "center" }}>⤵</button>
            </div>
          )}
          <button onClick={() => { if (!canvasRef.current) return; const r = canvasRef.current.getBoundingClientRect(); const pn = viewParentId ? getNode(viewParentId) : null; addNode(viewParentId, r.width / 2 - offset.x - 90, r.height / 2 - offset.y - 20, pn?.colorIdx || 0); }} style={{ width: 52, height: 52, borderRadius: 26, background: "#f59e0b", border: "none", color: "#000", fontSize: 24, fontWeight: 700, cursor: "pointer", fontFamily: F, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 16px rgba(245,158,11,0.3)" }}>+</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<Workspace />, document.getElementById("root"));
</script>
</body>
</html>
