name: Build app.html

on:
  push:
    paths:
      - 'src/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app.html
        run: |
          cd src
          bash build.sh ../app.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.html
          git diff --cached --quiet || git commit -m "build: auto-generate app.html from src/"
          git push
