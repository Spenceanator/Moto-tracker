<style>

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    padding:var(--safe-top) 16px var(--safe-bottom);min-height:100dvh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
  input,textarea,button,select{font-family:var(--font)}
  input[type="text"],input[type="date"],input[type="number"],textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--borderL);
    border-radius:6px;color:var(--text);padding:10px 12px;font-size:14px;outline:none}

  .th{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;text-align:left}
  .pt{background:var(--surface);border-radius:8px;padding:3px}
  .sb{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--borderL);background:rgba(255,255,255,0.03);color:#777}

  .chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borderL);background:transparent;color:#777;text-transform:uppercase;letter-spacing:0.5px}

  .link-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:6px;color:var(--cyan);font-size:12px;text-decoration:none;font-family:var(--font)}

  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(168,85,247,0.3);border-top-color:#a855f7;border-radius:50%;animation:sp .6s linear infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes bellShake{0%,100%{transform:rotate(0)}15%{transform:rotate(14deg)}30%{transform:rotate(-14deg)}45%{transform:rotate(10deg)}60%{transform:rotate(-6deg)}75%{transform:rotate(2deg)}}
  @media(prefers-color-scheme:dark){:root{color-scheme:dark}}
</style>
</head>

var DEF_LEAD_PROMPT='Analyze this motorcycle/vehicle listing screenshot. Extract all visible information and research the vehicle specs. Return ONLY a JSON object with these fields (use empty string if not found):\n{"year":"","make":"","model":"","askingPrice":"","mileage":"","titleStatus":"clean or salvage if stated","listingSource":"FB Marketplace, KSL, Craigslist, etc if visible","listingUrl":"","sellerName":"","sellerContact":"","estSellPrice":"your estimate of realistic sell price after fixing","flipDifficulty":"easy, moderate, or hard","partsAvailability":"excellent, good, fair, or poor","demandLevel":"high, medium, or low","estDaysToSell":"number estimate","notes":"any red flags, observations, or key details from the listing","status":"watching","knownIssues":[{"name":"issue description","severity":"low/med/high","difficulty":"easy/mod/hard","cost":"estimated dollar amount"}],"hiddenIssues":[{"name":"likely hidden issue based on age/type/symptoms","severity":"low/med/high","difficulty":"easy/mod/hard","cost":"estimated dollar amount"}],"specs":{"tirePsiFront":"psi spec","tirePsiRear":"psi spec","tireSizeFront":"size","tireSizeRear":"size","oilType":"weight and type","oilCapacity":"quarts or liters","fuelType":"octane requirement","sparkPlug":"part number","chainSize":"size and link count","coolantType":"type if liquid cooled","brakeFluid":"DOT type","bulbHeadlight":"bulb number","bulbTurnSignal":"bulb number","bulbTail":"bulb number","valveClearance":"intake/exhaust spec","torqueAxleFront":"ft-lbs","torqueAxleRear":"ft-lbs","torqueDrain":"ft-lbs","notes":"any other notable specs"}}\nLook up factory specs for this exact year/make/model. Be realistic about pricing and issues. Flag red flags. Return only the JSON, no other text.';

function migrate(d){
  if(!d.version)d.version=DV;if(!d.checklistTemplates)d.checklistTemplates=JSON.parse(JSON.stringify(DT));
  if(!d.leads)d.leads=[];if(!d.sold)d.sold=[];if(!d.expenses)d.expenses=[];if(!d.trips)d.trips=[];if(!d.jobs)d.jobs=[];d.jobs.forEach(function(j){if(j.laborHours&&!j.laborSeconds){j.laborSeconds=Math.round((parseFloat(j.laborHours)||0)*3600);delete j.laborHours}if(j.laborSeconds==null)j.laborSeconds=0;if(j.timerStart===undefined)j.timerStart=null;if(j.tasks)j.tasks.forEach(function(t){if(t.verified===undefined)t.verified=1})});if(!d.apiKey)d.apiKey="";if(!d.vehicles){d.vehicles=[];if(d.vehicle){d.vehicles.push(d.vehicle);delete d.vehicle}}if(d.leadPrompt==null)d.leadPrompt="";

function pollAllChats(){
  var tokens=data.jobs.filter(function(j){return j.shareToken&&j.status!=="delivered"}).map(function(j){return j.shareToken});
  if(tokens.length===0)return;
  var tokenFilter=tokens.map(function(t){return"token.eq."+t}).join(",");
  fetch(SB_URL+"/rest/v1/job_chat?or=("+tokenFilter+")&sender=eq.customer&order=created_at.desc&limit=50",{method:"GET",headers:sbHeaders()})
  .then(function(r){return r.json()}).then(function(msgs){
    if(!msgs)return;
    var prevCounts=JSON.parse(JSON.stringify(_chatCounts));
    _chatCounts={};
    msgs.forEach(function(m){
      var lastRead=_chatRead[m.token]||0;
      var msgTime=new Date(m.created_at).getTime();
      if(msgTime>lastRead){
        if(!_chatCounts[m.token])_chatCounts[m.token]=0;
        _chatCounts[m.token]++;
      }
    });
    // Notify per job that has NEW unread (not already notified)
    var totalUnread=Object.keys(_chatCounts).reduce(function(s,k){return s+_chatCounts[k]},0);
    if(Date.now()-_lastNotifTs>15000){
      Object.keys(_chatCounts).forEach(function(token){
        var prev=prevCounts[token]||0;
        if(_chatCounts[token]>prev){
          var job=data.jobs.find(function(j){return j.shareToken===token});
          if(job){
            var vt=[job.vehicleYear,job.vehicleMake,job.vehicleModel].filter(Boolean).join(" ")||"Job";

            sendNotif("💬 "+label,(job.customer||"Customer")+" sent a message",job.id);

        }

      if(totalUnread>0&&Object.keys(_chatCounts).some(function(k){return(_chatCounts[k]||0)>(prevCounts[k]||0)}))pingSound();
    }

}
