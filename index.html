<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moto Tracker">
<meta name="theme-color" content="#0a0a0a">
<title>Moto Tracker</title>
<style>
  :root {
    --bg:#0a0a0a;--surface:rgba(255,255,255,0.03);--border:#222;--borderL:#333;
    --text:#e5e5e5;--dim:#888;--muted:#555;
    --amber:#f59e0b;--red:#ef4444;--green:#22c55e;--blue:#60a5fa;--purple:#a855f7;--cyan:#22d3ee;
    --font:'JetBrains Mono','Fira Code','SF Mono','Menlo',monospace;
    --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;
    padding:var(--safe-top) 16px var(--safe-bottom);min-height:100dvh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
  input,textarea,button{font-family:var(--font)}
  input[type="text"],textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--borderL);
    border-radius:6px;color:var(--text);padding:10px 12px;font-size:14px;outline:none}
  textarea{resize:vertical;line-height:1.5}
  input::placeholder,textarea::placeholder{color:var(--muted)}
  button{cursor:pointer;border:none;background:none;color:var(--text)}
  .f{display:flex}.fc{display:flex;flex-direction:column}.fw{flex-wrap:wrap}
  .g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
  .ac{align-items:center}.as{align-items:flex-start}.jc{justify-content:center}.jb{justify-content:space-between}
  .f1{flex:1}.s0{flex-shrink:0}.w100{width:100%}
  .lbl{color:var(--amber);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
  .card{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-align:left;width:100%;transition:border-color .15s}
  .bs{background:rgba(255,255,255,0.05);border:1px solid var(--borderL);border-radius:6px;color:#999;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:6px}
  .bp{background:var(--amber);border:none;border-radius:6px;color:#000;padding:10px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}
  .bd{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:var(--red);padding:10px;font-size:12px;width:100%}
  .bg{background:transparent;border:2px dashed var(--borderL);border-radius:10px;color:var(--muted);padding:14px 16px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
  .ep{padding:16px;background:var(--surface);border-radius:10px;border:1px solid var(--borderL)}
  .cb{display:flex;gap:8px;padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;align-items:center}
  .nb{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:16px}
  .nt{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;background:transparent;color:#777;text-align:center}
  .nt.a{background:rgba(245,158,11,0.15);color:var(--amber)}
  .tab{padding:8px 12px;white-space:nowrap;border:none;border-radius:6px;color:#777;font-size:13px;font-weight:600;background:transparent}
  .tab.a{background:rgba(245,158,11,0.15);color:var(--amber)}
  .task{display:flex;flex-direction:column;padding:10px 12px;border-radius:8px}
  .ck{width:22px;height:22px;min-width:22px;border-radius:4px;border:2px solid #555;background:transparent;display:flex;align-items:center;justify-content:center;padding:0}
  .ck.on{border:none;background:var(--green)}
  .ck svg{display:none}.ck.on svg{display:block}
  .bb{background:rgba(255,255,255,0.05);border:none;border-radius:4px;padding:4px 6px;color:#777;display:flex;align-items:center}
  .bb.on{background:rgba(239,68,68,0.2);color:var(--red)}
  .ib{background:none;border:none;padding:4px;color:var(--muted);display:flex;align-items:center}
  .ibs{background:rgba(255,255,255,0.05);border:1px solid var(--borderL);border-radius:8px;padding:8px;color:#777;display:flex;align-items:center}
  .tw{border:1px solid var(--borderL);border-radius:10px;background:rgba(255,255,255,0.02);overflow:hidden}
  .th{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;text-align:left}
  .pt{background:var(--surface);border-radius:8px;padding:3px}
  .sb{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--borderL);background:rgba(255,255,255,0.03);color:#777}
  .photo-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--borderL)}
  .photo-lg{width:100%;max-height:200px;border-radius:8px;object-fit:cover;border:1px solid var(--borderL)}
  .photo-upload{display:flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:8px;border:2px dashed var(--borderL);color:var(--muted);font-size:20px;cursor:pointer;flex-shrink:0}
  .photo-upload:active{border-color:var(--amber);color:var(--amber)}
  .metric{padding:6px 10px;background:var(--surface);border-radius:6px;display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
  .metric-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .metric-value{font-size:12px;font-weight:600}
  .paste-zone{width:100%;min-height:80px;background:rgba(34,211,238,0.04);border:2px dashed rgba(34,211,238,0.3);border-radius:10px;color:var(--cyan);padding:12px;font-size:12px;font-family:var(--font);outline:none;resize:vertical}
  .paste-zone::placeholder{color:rgba(34,211,238,0.4)}
  @media(prefers-color-scheme:dark){:root{color-scheme:dark}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK="mototracker_data",DV=3;
const DT=[
  {id:"buy",name:"Buy",items:["Title clean and matches VIN","Compression check (or engine turns over)","Frame straight - no cracks or welds","Transport plan figured out","Calculated max buy price","Checked comps for realistic sell price","Known issues identified and priced out","No title mismatch or lien issues"]},
  {id:"sell",name:"Sell",items:["Runs and idles","All lights functional","Brakes working","Tires hold air","Oil level good / no active leaks","Chain tension and lube","Title in hand and ready to sign","Photos taken (all angles + detail shots)","Known issues documented for listing","Test ride completed","Listing price set from comps"]}
];
function fresh(){return{version:DV,bikes:[],leads:[],checklistTemplates:JSON.parse(JSON.stringify(DT))}}
function load(){try{const r=localStorage.getItem(SK);if(!r)return fresh();const d=JSON.parse(r);if(!d.version)d.version=DV;if(!d.checklistTemplates)d.checklistTemplates=JSON.parse(JSON.stringify(DT));if(!d.leads)d.leads=[];d.leads.forEach(l=>{if(!l.knownIssues)l.knownIssues=[];if(!l.hiddenIssues)l.hiddenIssues=[];["year","make","model","askingPrice","estSellPrice","mileage","titleStatus","listingSource","flipDifficulty","partsAvailability","demandLevel","estDaysToSell","notes"].forEach(k=>{if(l[k]!=null&&typeof l[k]!=="string")l[k]=String(l[k])});if(l.status&&!{"watching":1,"pursue":1,"pass":1}[l.status])l.status="watching";l.knownIssues.forEach(i=>{if(i.cost!=null&&typeof i.cost!=="string")i.cost=String(i.cost)});l.hiddenIssues.forEach(i=>{if(i.cost!=null&&typeof i.cost!=="string")i.cost=String(i.cost)})});if(d.bikes)d.bikes=d.bikes.map(b=>{if(!b.checklistTemplates)b.checklistTemplates=JSON.parse(JSON.stringify(d.checklistTemplates));if(!b.tasks)b.tasks=[];return b});return d}catch{return fresh()}}
function save(){try{localStorage.setItem(SK,JSON.stringify(data))}catch{}}
function mid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function S(v){return v==null?"":String(v)}

// Image compression
function compressImg(file,maxW,cb){const r=new FileReader();r.onload=function(e){const img=new Image();img.onload=function(){let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(c.toDataURL("image/jpeg",0.7))};img.src=e.target.result};r.readAsDataURL(file)}

const I={
plus:`<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="9" y1="3" x2="9" y2="15"/><line x1="3" y1="9" x2="15" y2="9"/></svg>`,

check:`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 7.5l3 3 6-6"/></svg>`,
wrench:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9.5 6.5l4.2 4.2a1.5 1.5 0 01-2.1 2.1L7.4 8.6M5.5 1.5a4 4 0 00-4 4.5l2-1.5 1.5 1.5L3.5 8a4 4 0 005-5L7 4.5 5.5 3z"/></svg>`,

gear:`<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="3"/><path d="M17.4 12.3a1.2 1.2 0 00.2 1.3l.1.1a1.5 1.5 0 11-2.1 2.1l-.1-.1a1.2 1.2 0 00-1.3-.2 1.2 1.2 0 00-.7 1.1v.2a1.5 1.5 0 01-3 0v-.1a1.2 1.2 0 00-.8-1.1 1.2 1.2 0 00-1.3.2l-.1.1a1.5 1.5 0 11-2.1-2.1l.1-.1a1.2 1.2 0 00.2-1.3 1.2 1.2 0 00-1.1-.7h-.2a1.5 1.5 0 010-3h.1a1.2 1.2 0 001.1-.8 1.2 1.2 0 00-.2-1.3l-.1-.1a1.5 1.5 0 112.1-2.1l.1.1a1.2 1.2 0 001.3.2h.1a1.2 1.2 0 00.7-1.1v-.2a1.5 1.5 0 013 0v.1a1.2 1.2 0 00.7 1.1 1.2 1.2 0 001.3-.2l.1-.1a1.5 1.5 0 112.1 2.1l-.1.1a1.2 1.2 0 00-.2 1.3v.1a1.2 1.2 0 001.1.7h.2a1.5 1.5 0 010 3h-.1a1.2 1.2 0 00-1.1.7z"/></svg>`,
edit:`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 1.5a1.4 1.4 0 012 2L4.5 11 1.5 12l1-3L10 1.5z"/></svg>`,

down:`<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v6M3 7l3 3 3-3"/></svg>`,
note:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 1H3.5A1.5 1.5 0 002 2.5v11A1.5 1.5 0 003.5 15h9a1.5 1.5 0 001.5-1.5V6L9 1z"/><path d="M9 1v5h5M5 9h6M5 12h4"/></svg>`,

convert:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8h14M11 4l4 4-4 4"/></svg>`,
cam:`<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 13.5v-8a2 2 0 012-2h1.7l1.3-2h5l1.3 2h1.7a2 2 0 012 2v8a2 2 0 01-2 2h-11a2 2 0 01-2-2z"/><circle cx="9" cy="9.5" r="3"/></svg>`,
paste:`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="1" width="10" height="3" rx="1"/><path d="M2 4h12v10a2 2 0 01-2 2H4a2 2 0 01-2-2V4z"/><path d="M6 8h4M6 11h4"/></svg>`,
};
function chev(o){return`<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform:rotate(${o?90:0}deg);transition:transform .15s"><path d="M5 3l4 4-4 4"/></svg>`}

let data=load(),cv="home",selBike=null,selLead=null,hTab="bikes";
let ui={addBike:0,addLead:0,showDone:0,bTab:"tasks",edit:0,rest:0,impTxt:"",impErr:"",tExp:{},tmExp:{},cfDel:null,lEdit:0,iExp:{},showPaste:0,pasteTxt:"",pasteErr:""};
let st=null;
function ss(){if(st)clearTimeout(st);st=setTimeout(save,200)}
function nav(v,id){cv=v;selBike=v==="bike"?id:null;selLead=v==="lead"?id:null;ui={...ui,addBike:0,addLead:0,showDone:0,bTab:"tasks",edit:0,tExp:{},cfDel:null,lEdit:0,iExp:{},showPaste:0,pasteTxt:"",pasteErr:""};R()}

function h(t,a,...c){const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="src"||k==="type"||k==="rows"||k==="placeholder"||k==="value"||k==="accept"||k==="capture"||k==="multiple")e.setAttribute(k,v);else e.setAttribute(k,v)});c.flat(Infinity).forEach(x=>{if(x==null||x===false)return;e.appendChild(typeof x==="string"||typeof x==="number"?document.createTextNode(String(x)):x)});return e}
function ic(n,s){const sp=document.createElement("span");sp.innerHTML=I[n]||"";sp.style.display="flex";sp.style.alignItems="center";if(s)Object.assign(sp.style,s);return sp}
function badge(t){const m={rider:{bg:"rgba(59,130,246,0.15)",c:"#60a5fa"},flip:{bg:"rgba(168,85,247,0.15)",c:"#a855f7"},watching:{bg:"rgba(34,211,238,0.12)",c:"#22d3ee"},pursue:{bg:"rgba(34,197,94,0.12)",c:"#22c55e"},pass:{bg:"rgba(239,68,68,0.12)",c:"#ef4444"}}[t]||{bg:"rgba(34,211,238,0.12)",c:"#22d3ee"};return h("span",{style:{background:m.bg,color:m.c,padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px",flexShrink:0}},t)}
function confirm_(msg,onY,onN){return h("div",{class:"cb"},h("span",{style:{flex:1,color:"#ef4444",fontSize:12}},msg),h("button",{class:"bs",style:{color:"#ef4444",borderColor:"rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.1)",padding:"6px 10px"},onClick:onY},"Yes"),h("button",{class:"bs",style:{padding:"6px 10px"},onClick:onN},"No"))}
function ckbox(on,fn){const b=h("button",{class:"ck"+(on?" on":""),onClick:fn});b.innerHTML=I.check;return b}
function calcRehab(l){return(l.knownIssues||[]).concat(l.hiddenIssues||[]).reduce((s,i)=>s+(parseFloat(i.cost)||0),0)}
function calcMargin(l){const sell=parseFloat(S(l.estSellPrice).replace(/[^0-9.]/g,""))||0;const buy=parseFloat(S(l.askingPrice).replace(/[^0-9.]/g,""))||0;return sell-buy-calcRehab(l)}

// Photo upload helper
function photoUpload(leadId,afterCb){
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=function(){if(inp.files[0]){compressImg(inp.files[0],400,function(b64){const ld=data.leads.find(l=>l.id===leadId);if(ld){ld.photo=b64;ss();if(afterCb)afterCb()}})}};inp.click();
}

// ============ BACKUP ============
function rBackup(){
  const bar=h("div",{style:{marginBottom:12}});
  const row=h("div",{class:"f ac g8"});
  row.append(h("span",{style:{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block",flexShrink:0}}),h("span",{style:{fontSize:11,color:"#22c55e",flex:1}},"Auto-saved"));

  const rb=h("button",{class:"bs",style:{padding:"5px 10px",fontSize:11},onClick:()=>{ui.rest=!ui.rest;R()}});rb.append(ic("loadIco")," Restore");btns.append(rb);row.append(btns);bar.append(row);
  if(ui.rest){
    const p=h("div",{class:"fc g8",style:{marginTop:8,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:8,border:"1px solid #333"}});
    const ta=h("textarea",{rows:"3",placeholder:"Paste backup data...",style:{fontSize:11},onInput:e=>{ui.impTxt=e.target.value;ui.impErr=""}});ta.value=ui.impTxt;p.append(ta);
    if(ui.impErr)p.append(h("span",{style:{fontSize:11,color:"#ef4444"}},ui.impErr));
    p.append(h("div",{class:"f g8"},h("button",{class:"bs",style:{background:"rgba(245,158,11,0.15)",borderColor:"#f59e0b",color:"#f59e0b"},onClick:()=>{try{const x=JSON.parse(ui.impTxt);if(!x.bikes||!x.checklistTemplates){ui.impErr="Bad format";R();return}if(!x.leads)x.leads=[];data=x;save();ui.rest=0;ui.impTxt="";R()}catch{ui.impErr="Invalid JSON";R()}}},"Import"),h("button",{class:"bs",onClick:()=>{ui.rest=0;ui.impTxt="";ui.impErr="";R()}},"Cancel")));bar.append(p)}
  return bar;
}

// ============ TASKS ============
function rTask(task,bike){
  const c=task.done?"#22c55e":task.blocked?"#ef4444":"#f59e0b";
  const row=h("div",{class:"task",style:{borderLeft:`3px solid ${c}`,background:task.done?"rgba(34,197,94,0.06)":task.blocked?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.03)"}});
  const main=h("div",{class:"f ac g10"});
  main.append(ckbox(task.done,()=>{task.done=!task.done;ss();R()}));
  main.append(h("span",{style:{flex:1,color:task.done?"#666":"#e5e5e5",textDecoration:task.done?"line-through":"none",cursor:"pointer",lineHeight:1.4},onClick:()=>{ui.tExp[task.id]=!ui.tExp[task.id];R()}},task.name));
  if(task.note&&!ui.tExp[task.id])main.append(h("span",{style:{cursor:"pointer",color:"#555",display:"flex"},onClick:()=>{ui.tExp[task.id]=1;R()}},ic("note")));
