<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drydock">
<meta name="theme-color" content="#0a0a0a">
<title>Drydock — Login</title>
<style>
  :root{--bg:#0a0a0a;--surface:rgba(255,255,255,0.03);--border:#222;--borderL:#333;--text:#e5e5e5;--dim:#888;--muted:#555;--amber:#f59e0b;--red:#ef4444;--green:#22c55e;--font:'JetBrains Mono','Fira Code','SF Mono','Menlo',monospace}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
  .wrap{width:100%;max-width:360px;display:flex;flex-direction:column;gap:24px}
  .logo{text-align:center}
  .logo h1{font-size:32px;font-weight:800;color:var(--amber);letter-spacing:-1px}
  .logo p{color:var(--muted);font-size:12px;margin-top:4px}
  .form{display:flex;flex-direction:column;gap:12px}
  input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--borderL);border-radius:8px;color:var(--text);padding:12px 14px;font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s}
  input:focus{border-color:var(--amber)}
  input::placeholder{color:var(--muted)}
  .btn{width:100%;background:var(--amber);border:none;border-radius:8px;color:#000;padding:14px;font-weight:700;font-size:14px;font-family:var(--font);cursor:pointer;transition:opacity .15s}
  .btn:active{opacity:0.8}
  .btn:disabled{opacity:0.4;cursor:default}
  .err{color:var(--red);font-size:12px;text-align:center;min-height:18px}
  @media(prefers-color-scheme:dark){:root{color-scheme:dark}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>DRYDOCK</h1>
    <p>Mechanical repair & vehicle flip tracker</p>
  </div>
  <div class="form">
    <input type="email" id="email" placeholder="Email" autocomplete="email" autocapitalize="off">
    <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="login" onclick="doLogin()">Sign In</button>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
var SB_URL="https://pcojcgvwstwgrbjtfbni.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjb2pjZ3Z3c3R3Z3JianRmYm5pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzEwNTksImV4cCI6MjA4ODk0NzA1OX0.0R54Z5cXeQrMzFCQ-r6ybuN8T3fsNZOfEvG4Hqwc9mI";
var AUTH_SK="drydock_auth";

// Check existing session
var existing=localStorage.getItem(AUTH_SK);
if(existing){try{var s=JSON.parse(existing);if(s.access_token&&s.expires_at>Date.now()/1000){window.location.href="app.html"}}catch(e){}}

function doLogin(){
  var email=document.getElementById("email").value.trim();
  var pass=document.getElementById("pass").value;
  var err=document.getElementById("err");
  var btn=document.getElementById("login");
  if(!email||!pass){err.textContent="Enter email and password";return}
  err.textContent="";btn.disabled=true;btn.textContent="Signing in...";
  fetch(SB_URL+"/auth/v1/token?grant_type=password",{
    method:"POST",
    headers:{"Content-Type":"application/json","apikey":SB_KEY},
    body:JSON.stringify({email:email,password:pass})
  }).then(function(r){return r.json()}).then(function(d){
    if(d.error||!d.access_token){err.textContent=d.error_description||d.msg||"Login failed";btn.disabled=false;btn.textContent="Sign In";return}
    localStorage.setItem(AUTH_SK,JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:d.expires_at||Math.floor(Date.now()/1000)+3600,email:d.user?d.user.email:""}));
    window.location.href="app.html";
  }).catch(function(e){err.textContent="Connection failed";btn.disabled=false;btn.textContent="Sign In"});
}
document.getElementById("pass").addEventListener("keydown",function(e){if(e.key==="Enter")doLogin()});
document.getElementById("email").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("pass").focus()});
</script>
</body>
</html>
