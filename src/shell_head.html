<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drydock">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>Drydock</title>
<style>
  :root {
    --bg:#0a0a0a;--surface:rgba(255,255,255,0.03);--border:#222;--borderL:#333;
    --text:#e5e5e5;--dim:#888;--muted:#555;
    --amber:#f59e0b;--red:#ef4444;--green:#22c55e;--blue:#60a5fa;--purple:#a855f7;--cyan:#22d3ee;
    --font:'JetBrains Mono','Fira Code','SF Mono','Menlo',monospace;
    --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;
    padding:var(--safe-top) 16px var(--safe-bottom);min-height:100dvh;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}
  input,textarea,button,select{font-family:var(--font)}
  input[type="text"],input[type="date"],input[type="number"],textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--borderL);
    border-radius:6px;color:var(--text);padding:10px 12px;font-size:14px;outline:none}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
  textarea{resize:vertical;line-height:1.5}
  input::placeholder,textarea::placeholder{color:var(--muted)}
  button{cursor:pointer;border:none;background:none;color:var(--text)}
  a{color:var(--cyan);text-decoration:none}
  .f{display:flex}.fc{display:flex;flex-direction:column}.fw{flex-wrap:wrap}
  .g4{gap:4px}.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
  .ac{align-items:center}.as{align-items:flex-start}.jc{justify-content:center}.jb{justify-content:space-between}
  .f1{flex:1}.s0{flex-shrink:0}.w100{width:100%}
  .lbl{color:var(--amber);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
  .card{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-align:left;width:100%;transition:border-color .15s}
  .bs{background:rgba(255,255,255,0.05);border:1px solid var(--borderL);border-radius:6px;color:#999;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:6px}
  .bp{background:var(--amber);border:none;border-radius:6px;color:#000;padding:10px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px}
  .bd{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;color:var(--red);padding:10px;font-size:12px;width:100%}
  .bg{background:transparent;border:2px dashed var(--borderL);border-radius:10px;color:var(--muted);padding:14px 16px;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
  .ep{padding:16px;background:var(--surface);border-radius:10px;border:1px solid var(--borderL)}
  .cb{display:flex;gap:8px;padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;align-items:center}
  .nb{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:16px}
  .nt{flex:1;padding:10px;border:none;border-radius:8px;font-size:11px;font-weight:600;background:transparent;color:#777;text-align:center}
  .nt.a{background:rgba(245,158,11,0.15);color:var(--amber)}
  .tab{padding:8px 12px;white-space:nowrap;border:none;border-radius:6px;color:#777;font-size:13px;font-weight:600;background:transparent}
  .tab.a{background:rgba(245,158,11,0.15);color:var(--amber)}
  .task{display:flex;flex-direction:column;padding:10px 12px;border-radius:8px}
  .ck{width:22px;height:22px;min-width:22px;border-radius:4px;border:2px solid #555;background:transparent;display:flex;align-items:center;justify-content:center;padding:0}
  .ck.on{border:none;background:var(--green)}
  .ck svg{display:none}.ck.on svg{display:block}
  .bb{background:rgba(255,255,255,0.05);border:none;border-radius:4px;padding:4px 6px;color:#777;display:flex;align-items:center}
  .bb.on{background:rgba(239,68,68,0.2);color:var(--red)}
  .ib{background:none;border:none;padding:4px;color:var(--muted);display:flex;align-items:center}
  .ibs{background:rgba(255,255,255,0.05);border:1px solid var(--borderL);border-radius:8px;padding:8px;color:#777;display:flex;align-items:center}
  .tw{border:1px solid var(--borderL);border-radius:10px;background:rgba(255,255,255,0.02);overflow:hidden}
  .th{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;text-align:left}
  .pt{background:var(--surface);border-radius:8px;padding:3px}
  .sb{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border:1px solid var(--borderL);background:rgba(255,255,255,0.03);color:#777}
  .photo-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--borderL)}
  .photo-lg{width:100%;max-height:300px;border-radius:8px;object-fit:cover;border:1px solid var(--borderL);cursor:pointer}
  .photo-upload{display:flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:8px;border:2px dashed var(--borderL);color:var(--muted);font-size:20px;cursor:pointer;flex-shrink:0}
  .photo-upload:active{border-color:var(--amber);color:var(--amber)}
  .metric{padding:6px 10px;background:var(--surface);border-radius:6px;display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
  .metric-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .metric-value{font-size:12px;font-weight:600}
  .paste-zone{width:100%;min-height:80px;background:rgba(34,211,238,0.04);border:2px dashed rgba(34,211,238,0.3);border-radius:10px;color:var(--cyan);padding:12px;font-size:12px;font-family:var(--font);outline:none;resize:vertical}
  .paste-zone::placeholder{color:rgba(34,211,238,0.4)}
  .chip{padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--borderL);background:transparent;color:#777;text-transform:uppercase;letter-spacing:0.5px}
  .chip.on{border-color:currentColor}
  .sold-card{padding:12px 14px;background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.15);border-radius:10px;text-align:left;width:100%}
  .link-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:6px;color:var(--cyan);font-size:12px;text-decoration:none;font-family:var(--font)}
  .scan-btn{background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);border-radius:6px;color:#a855f7;padding:10px 14px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
  .scan-btn:active{background:rgba(168,85,247,0.15)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(168,85,247,0.3);border-top-color:#a855f7;border-radius:50%;animation:sp .6s linear infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes bellShake{0%,100%{transform:rotate(0)}15%{transform:rotate(14deg)}30%{transform:rotate(-14deg)}45%{transform:rotate(10deg)}60%{transform:rotate(-6deg)}75%{transform:rotate(2deg)}}
  @media(prefers-color-scheme:dark){:root{color-scheme:dark}}
</style>
</head>
<body>
<div id="site-nav" style="position:fixed;top:0;left:0;right:0;height:40px;background:#050505;border-bottom:1px solid #1a1a1c;display:flex;align-items:center;padding:0 12px;gap:6px;z-index:9999;font-family:'JetBrains Mono','Fira Code','SF Mono','Menlo',monospace;overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
<div id="app" style="padding-top:40px"></div>
